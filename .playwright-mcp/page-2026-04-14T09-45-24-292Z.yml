    - generic [ref=e174]:
      - generic [ref=e175]:
        - generic: "\""
        - paragraph [ref=e176]: "\"In 2016, we saw gaps in our local education system. We didn't want to just talk about it—we wanted to act. Seeing students thrive today makes every challenge we faced completely worth it.\""
        - generic [ref=e177]:
          - generic [ref=e178]: A
          - generic [ref=e179]:
            - generic [ref=e180]: Arshad Ahamed
            - generic [ref=e181]: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"Building EDF from the ground up taught me that true strength lies in community support. Providing consistent healthcare and resources isn't just charity; it's our fundamental duty.\""
        - generic:
          - generic: A
          - generic:
            - generic: Anshak Ahamed
            - generic: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"Every time we deploy a new livelihood program, I see a family break the cycle of poverty. We're not just offering funds; we're giving people the skills to forge their own paths.\""
        - generic:
          - generic: M
          - generic:
            - generic: Musthaq Ahamed
            - generic: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"From coordinating relief during Ramadan to setting up youth workshops, our mission has always been clear: no one gets left behind. Galgamuwa's youth are our brightest future.\""
        - generic:
          - generic: R
          - generic:
            - generic: Rikas
            - generic: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"Running our operations means hearing countless heartbreaking stories, but more importantly, it means being part of their solutions. We stand shoulder-to-shoulder with our people.\""
        - generic:
          - generic: H
          - generic:
            - generic: Hamas
            - generic: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"It's incredible to see how a handful of volunteers transformed into a massive support network. Organizing events and training programs reminds me why I joined EDF in the first place.\""
        - generic:
          - generic: A
          - generic:
            - generic: Arshad Anver
            - generic: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"Our skills development programs have turned dreams into reality for many young men and women. The dedication of our community to learn and grow pushes us to expand our efforts daily.\""
        - generic:
          - generic: A
          - generic:
            - generic: Amhar
            - generic: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"Logistics and groundwork often go unnoticed, but the smiles of the families receiving our aid are the only rewards we need. We're building a foundation that will outlast us all.\""
        - generic:
          - generic: F
          - generic:
            - generic: Fasmer
            - generic: Executive Member
      - generic:
        - generic: "\""
        - paragraph: "\"The true measure of our success is not the numbers, but the individual lives we've touched. Ensuring children have their school supplies feels like watching seeds grow into forests.\""
        - generic:
          - generic: F
          - generic:
            - generic: Faham
            - generic: Executive Member
