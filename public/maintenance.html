<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance — EDF Galgamuwa</title>
    <link rel="icon" href="/uploads/favicon" id="faviconEl">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --crimson:  #295742;
            --amber:    #E8A020;
            --navy:     #0C1A34;
            --cream:    #F9F4EC;
            --linen:    #EDE3D0;
        }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--navy);
            overflow: hidden;
        }

        /* ── Canvas particle field ─────────────────────── */
        #particles-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Floating orbs ─────────────────────────────── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            animation: orbFloat var(--dur, 8s) ease-in-out infinite alternate;
        }
        .orb-1 { width: 500px; height: 500px; top: -150px; left: -100px; background: radial-gradient(circle, rgba(41,87,66,0.35) 0%, transparent 70%); --dur: 9s; }
        .orb-2 { width: 400px; height: 400px; bottom: -100px; right: -80px;  background: radial-gradient(circle, rgba(232,160,32,0.18) 0%, transparent 70%); --dur: 11s; animation-delay: -4s; }
        .orb-3 { width: 300px; height: 300px; top: 40%;   left: 55%;        background: radial-gradient(circle, rgba(41,87,66,0.2) 0%, transparent 70%); --dur: 7s; animation-delay: -2s; }

        @keyframes orbFloat {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, -40px) scale(1.08); }
        }

        /* ── Main layout ───────────────────────────────── */
        .scene {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* ── Glassmorphism card ────────────────────────── */
        .glass-card {
            position: relative;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 28px;
            padding: 3.5rem 3.5rem 3rem;
            max-width: 560px;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06) inset,
                0 32px 80px rgba(0,0,0,0.45),
                0 0 0 60px transparent;
        }

        /* Animated glowing border */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                rgba(41,87,66,0.7) 20%,
                rgba(232,160,32,0.6) 40%,
                transparent 60%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 4s linear infinite;
            pointer-events: none;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }
        @keyframes borderSpin {
            to { --angle: 360deg; }
        }

        /* ── Logo / Icon area ──────────────────────────── */
        .maint-icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.75rem;
            background: linear-gradient(135deg, rgba(41,87,66,0.25) 0%, rgba(232,160,32,0.12) 100%);
            border: 1px solid rgba(41,87,66,0.3);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .maint-icon-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
        }
        .maint-icon-wrap svg {
            width: 36px;
            height: 36px;
            color: var(--amber);
            position: relative;
            z-index: 1;
            animation: iconPulse 2.5s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.1) rotate(3deg); }
        }

        /* ── Typography ────────────────────────────────── */
        .maint-eyebrow {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 0.6rem;
            opacity: 0;
        }
        .maint-title {
            font-size: clamp(1.6rem, 4vw, 2.25rem);
            font-weight: 800;
            color: #ffffff;
            line-height: 1.15;
            margin-bottom: 1rem;
            opacity: 0;
        }
        .maint-title span {
            background: linear-gradient(135deg, var(--crimson) 0%, var(--amber) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .maint-desc {
            font-size: 0.93rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
            max-width: 380px;
            margin: 0 auto 2rem;
            opacity: 0;
        }

        /* ── Progress bar ──────────────────────────────── */
        .progress-wrap {
            margin-bottom: 2rem;
            opacity: 0;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.73rem;
            color: rgba(255,255,255,0.38);
        }
        .progress-bar-track {
            height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--crimson) 0%, var(--amber) 100%);
            border-radius: 99px;
            animation: progressFill 3.5s ease-out forwards;
            animation-delay: 1.2s;
        }
        @keyframes progressFill {
            to { width: 68%; }
        }

        /* ── Status dots ───────────────────────────────── */
        .status-row {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2.5rem;
            opacity: 0;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
        }
        .status-dot.green  { background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: dotPulse 2s ease-in-out infinite; }
        .status-dot.yellow { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: dotPulse 2s ease-in-out infinite 0.3s; }
        .status-dot.red    { background: #f87171; box-shadow: 0 0 6px #f87171; animation: dotPulse 2s ease-in-out infinite 0.6s; }
        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        /* ── Divider ───────────────────────────────────── */
        .maint-divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 0 -0.5rem 1.75rem;
            opacity: 0;
        }

        /* ── Footer link ───────────────────────────────── */
        .maint-footer {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.28);
            opacity: 0;
        }
        .maint-footer a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.2s;
        }
        .maint-footer a:hover { color: var(--amber); }

        /* ── Countdown timer ───────────────────────────── */
        .maint-countdown {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0;
        }
        .countdown-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }
        .countdown-val {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            min-width: 2.5ch;
        }
        .countdown-lbl {
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
        .countdown-sep {
            font-size: 1.8rem;
            font-weight: 800;
            color: rgba(255,255,255,0.18);
            padding-top: 0.1rem;
            animation: sepBlink 1s step-end infinite;
        }
        @keyframes sepBlink { 0%,100%{opacity:1} 50%{opacity:0.15} }

        /* ── Responsive ────────────────────────────────── */
        @media (max-width: 600px) {
            .glass-card { padding: 2.5rem 1.75rem 2rem; }
            .status-row { flex-wrap: wrap; gap: 1rem; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="scene">
    <div class="glass-card" id="mainCard">

        <!-- Icon -->
        <div class="maint-icon-wrap" id="iconWrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
        </div>

        <!-- Text -->
        <div class="maint-eyebrow" id="eyebrow">Scheduled Maintenance</div>
        <h1 class="maint-title" id="mainTitle">We'll be back <span>shortly</span></h1>
        <p class="maint-desc" id="mainDesc">
            EDF Management Portal is currently undergoing scheduled maintenance to bring you improvements.
            We apologize for any inconvenience.
        </p>

        <!-- Progress -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-label">
                <span>Maintenance in progress</span>
                <span id="progressPct">—</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Status row -->
        <div class="status-row" id="statusRow">
            <div class="status-item"><div class="status-dot green"></div><span>Database</span></div>
            <div class="status-item"><div class="status-dot yellow"></div><span>Web Server</span></div>
            <div class="status-item"><div class="status-dot red"></div><span>Application</span></div>
        </div>

        <!-- Divider -->
        <div class="maint-divider" id="divider"></div>

        <!-- Footer -->
        <div class="maint-footer" id="footer">
            Need access? <a href="/login">Sign in as admin</a> &nbsp;·&nbsp;
            &copy; <span id="yearSpan"></span> EDF Galgamuwa
        </div>

    </div>
</div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// ── Year ─────────────────────────────────────────────────
document.getElementById('yearSpan').textContent = new Date().getFullYear();

// ── Branding from settings ────────────────────────────────
(async () => {
    try {
        const r = await fetch('/api/settings');
        if (r.ok) {
            const cfg = await r.json();
            if (cfg.favicon_url) {
                document.getElementById('faviconEl').href = cfg.favicon_url;
            }
        }
    } catch (_) {}
})();

// ── Canvas particle field ──────────────────────────────────
(function () {
    const canvas = document.getElementById('particles-canvas');
    const ctx    = canvas.getContext('2d');
    const COLS   = ['rgba(41,87,66,', 'rgba(232,160,32,', 'rgba(255,255,255,'];
    let   W, H, particles = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resize(); init(); });
    resize();

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function createParticle() {
        const col = COLS[Math.floor(Math.random() * COLS.length)];
        return {
            x:    rand(0, W), y: rand(0, H),
            r:    rand(0.5, 2.2),
            vx:   rand(-0.18, 0.18),
            vy:   rand(-0.18, 0.18),
            a:    rand(0.05, 0.35),
            col,
        };
    }

    function init() {
        const count = Math.floor((W * H) / 9000);
        particles = Array.from({ length: count }, createParticle);
    }
    init();

    function loop() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
            if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.col + p.a + ')';
            ctx.fill();
        }
        requestAnimationFrame(loop);
    }
    loop();
})();

// ── Progress label updater ─────────────────────────────────
(function () {
    const fill  = document.getElementById('progressFill');
    const label = document.getElementById('progressPct');
    const target = 68;
    let current  = 0;
    const ival = setInterval(() => {
        current = Math.min(current + 1, target);
        label.textContent = current + '%';
        if (current >= target) clearInterval(ival);
    }, 3500 / target);
    // start after animation delay
    setTimeout(() => { clearInterval(ival); }, 4800);
})();

// ── GSAP entrance timeline ─────────────────────────────────
(function () {
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#mainCard',    { opacity: 1, y: 0,    duration: 0.9 })
      .to('#iconWrap',    { opacity: 1, y: 0,    duration: 0.5 }, '-=0.5')
      .to('#eyebrow',     { opacity: 1, y: 0,    duration: 0.45 }, '-=0.3')
      .to('#mainTitle',   { opacity: 1, y: 0,    duration: 0.45 }, '-=0.25')
      .to('#mainDesc',    { opacity: 1, y: 0,    duration: 0.45 }, '-=0.25')
      .to('#progressWrap',{ opacity: 1, y: 0,    duration: 0.4  }, '-=0.2')
      .to('#statusRow',   { opacity: 1, y: 0,    duration: 0.4  }, '-=0.2')
      .to('#divider',     { opacity: 1, duration: 0.35 }, '-=0.15')
      .to('#footer',      { opacity: 1, y: 0,    duration: 0.35 }, '-=0.15');

    // Set initial states for animated elements
    gsap.set(['#eyebrow','#mainTitle','#mainDesc','#progressWrap','#statusRow','#footer'],
        { y: 18 });
})();

// ── Auto-redirect when maintenance ends ───────────────────
(function () {
    setInterval(async () => {
        try {
            const r = await fetch('/api/settings/maintenance');
            if (r.ok) {
                const d = await r.json();
                if (d.maintenance_mode === '0' || d.maintenance_mode === false) {
                    window.location.href = '/';
                }
            }
        } catch (_) {}
    }, 15000); // check every 15 seconds
})();
</script>
</body>
</html>
