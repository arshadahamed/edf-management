<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EDF Galgamuwa</title>
    <!-- General Sans Font -->
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'General Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Background */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Login Container */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            display: inline-block;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 8px;
            background: linear-gradient(144.5deg, #ffffff 28%, rgba(255, 255, 255, 0.5) 115%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 400;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            padding-left: 16px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            color: rgba(255, 255, 255, 0.4);
            width: 18px;
            height: 18px;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 0.6px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-family: inherit;
            padding: 14px 20px 14px 48px;
            border-radius: 9999px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .form-input:focus+.input-icon,
        .input-wrapper:focus-within .input-icon {
            color: #ffffff;
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
            border: 0.6px solid rgba(239, 68, 68, 0.2);
            font-weight: 500;
        }

        /* Pill Button */
        .btn-pill {
            position: relative;
            display: inline-flex;
            width: 100%;
            border-radius: 9999px;
            border: 0.6px solid #ffffff;
            text-decoration: none;
            overflow: hidden;
            margin-top: 12px;
            background: none;
            cursor: pointer;
            padding: 0;
        }

        .btn-inner {
            width: 100%;
            padding: 14px 29px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            position: relative;
            z-index: 2;
            border-radius: 9999px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #000000;
            border: none;
            outline: none;
            cursor: pointer;
        }

        .btn-glow {
            position: absolute;
            top: 0;
            left: 15%;
            width: 70%;
            height: 6px;
            background: radial-gradient(ellipse at top, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(2px);
            z-index: 1;
            pointer-events: none;
        }

        .btn-pill:hover .btn-inner {
            background-color: #f2f2f2;
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 32px;
            font-weight: 400;
        }

        /* Entrance Animation */
        .login-wrapper {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <a href="/" class="logo">EDF GALGAMUWA</a>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to your dashboard</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Username or Email</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-pill">
                    <span class="btn-glow"></span>
                    <span class="btn-inner">Sign In</span>
                </button>
            </form>

            <p class="footer-text">
                &copy; 2026 EDF. Secure Administrator Access Only.
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
